<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Arena</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2/lib/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar-left">
      <div class="sidebar-header">
        <h2>对话</h2>
        <button id="new-session-btn" title="新建会话">+ 新对话</button>
      </div>
      <div id="session-list"></div>
    </aside>

    <section id="center">
      <header id="chat-header">
        <div class="chat-title">
          <h1 id="chat-title-text">AI Chat Arena</h1>
          <div class="chat-subtitle-row">
            <span class="chat-subtitle-label">工作目录</span>
            <span id="chat-subtitle" class="chat-subtitle">未设置</span>
            <div class="chat-subtitle-actions">
              <button id="edit-session-meta-btn" class="chat-icon-btn" title="编辑会话设置" aria-label="编辑会话设置" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.12 2.12 0 113 3L7 19l-4 1 1-4 12.5-12.5z"></path>
                </svg>
              </button>
              <button id="settings-btn" class="chat-icon-btn" title="设置" aria-label="设置" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11.983 5.5c.291-1.52 2.463-1.52 2.754 0a1.41 1.41 0 001.99 1.007c1.35-.756 2.886.78 2.13 2.13a1.41 1.41 0 001.007 1.99c1.52.291 1.52 2.463 0 2.754a1.41 1.41 0 00-1.007 1.99c.756 1.35-.78 2.886-2.13 2.13a1.41 1.41 0 00-1.99 1.007c-.291 1.52-2.463 1.52-2.754 0a1.41 1.41 0 00-1.99-1.007c-1.35.756-2.886-.78-2.13-2.13a1.41 1.41 0 00-1.007-1.99c-1.52-.291-1.52-2.463 0-2.754a1.41 1.41 0 001.007-1.99c-.756-1.35.78-2.886 2.13-2.13a1.41 1.41 0 001.99-1.007z"></path>
                  <circle cx="13.36" cy="12" r="2.5"></circle>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="chat-container">
        <div id="messages">
          <div id="system-notice" class="system-notice">
            输入 <code>@Faker</code> 调用 Claude，<code>@奇迹哥</code> 调用 Trae，<code>@YYF</code> 调用 Codex
          </div>
        </div>
      </main>
      <button id="jump-to-latest-btn" title="跳到最新消息">有新消息</button>

      <footer id="input-area">
        <div id="mention-hints" class="hidden"></div>
        <div id="input-row">
          <textarea id="message-input" placeholder="输入消息... (@ 召唤角色)" rows="1"></textarea>
          <button id="send-btn" title="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </div>
      </footer>
    </section>

    <aside id="sidebar-right">
      <div class="panel">
        <h3>角色状态</h3>
        <div id="character-statuses"></div>
      </div>
      <div class="panel">
        <h3>消息统计</h3>
        <div id="message-stats">
          <div class="stat-row"><span>总数</span><span>0</span></div>
        </div>
      </div>
      <div class="panel">
        <h3>对话信息</h3>
        <div id="session-info-panel">
          <div class="stat-row"><span>Session</span><span id="session-id-display" class="mono"></span></div>
        </div>
      </div>
    </aside>
  </div>

  <div id="thread-panel" class="thread-panel">
    <div class="thread-panel-header">
      <h3>回复</h3>
      <button id="thread-close-btn" class="thread-close-btn" title="关闭">&times;</button>
    </div>
    <div id="thread-messages" class="thread-messages"></div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-panel settings-layout">
      <aside class="settings-sidebar">
        <div class="settings-sidebar-title" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11.983 5.5c.291-1.52 2.463-1.52 2.754 0a1.41 1.41 0 001.99 1.007c1.35-.756 2.886.78 2.13 2.13a1.41 1.41 0 001.007 1.99c1.52.291 1.52 2.463 0 2.754a1.41 1.41 0 00-1.007 1.99c.756 1.35-.78 2.886-2.13 2.13a1.41 1.41 0 00-1.99 1.007c-.291 1.52-2.463 1.52-2.754 0a1.41 1.41 0 00-1.99-1.007c-1.35.756-2.886-.78-2.13-2.13a1.41 1.41 0 00-1.007-1.99c-1.52-.291-1.52-2.463 0-2.754a1.41 1.41 0 001.007-1.99c-.756-1.35.78-2.886 2.13-2.13a1.41 1.41 0 001.99-1.007z"></path>
            <circle cx="13.36" cy="12" r="2.5"></circle>
          </svg>
        </div>
        <button class="settings-tab active" data-settings-tab="roles" type="button">创建角色</button>
        <button class="settings-tab" data-settings-tab="skills" type="button">SKILL</button>
      </aside>
      <section class="settings-main">
        <div class="settings-main-header">
          <div>
            <h3 id="settings-title">角色管理</h3>
            <p id="settings-subtitle" class="modal-desc">管理角色名称、模型配置。可归档、恢复和新增角色。</p>
          </div>
        </div>
        <div id="settings-error" class="settings-error hidden"></div>
        <div id="settings-form"></div>
        <div id="settings-skills-panel" class="settings-skills-panel hidden">
          <div class="settings-skills-block">
            <h4>Recent Skill Hits</h4>
            <div id="skill-trace-list"></div>
          </div>
          <div class="settings-skills-block">
            <h4>Loaded Skills</h4>
            <div id="skill-list"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="settings-cancel-btn" class="btn-secondary">关闭</button>
          <button id="settings-save-btn" class="btn-primary">保存角色</button>
        </div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
